# zare_nk_050214_nokteh(distributionPath masire fareiye maghsade file download shodeh ro mide. distributionPath ro wrapper/dists dadim, pas addresse kolli dar systeme man mishe: C:\Users\kavian.HV\.gradle\wrapper\dists)
